<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문서 검색 | CCPC Document Search</title>
<style>
  :root{
    --navy: #0f2a4a;
    --navy-deep: #081a30;
    --gold: #c9a227;
    --gold-soft: #e8d8a0;
    --paper: #f7f5f0;
    --ink: #1b1f24;
    --line: #d9d4c6;
  }

  *{ box-sizing: border-box; }
  body{
    margin:0;
    font-family: "Pretendard", "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif;
    background: var(--paper);
    color: var(--ink);
  }

  header{
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
    color: #fff;
    padding: 36px 20px 30px;
    text-align: center;
    border-bottom: 4px solid var(--gold);
  }
  header h1{
    margin:0 0 6px;
    font-size: 1.5rem;
    letter-spacing: 0.02em;
  }
  header p{
    margin:0;
    color: var(--gold-soft);
    font-size: 0.85rem;
    letter-spacing: 0.03em;
  }

  main{
    max-width: 880px;
    margin: 0 auto;
    padding: 28px 18px 60px;
  }

  .search-sticky{
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--paper);
    padding-top: 14px;
    padding-bottom: 10px;
    margin: -14px 0 0;
  }
  .search-sticky::after{
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 1px;
    background: var(--line);
    opacity: 0;
    transition: opacity .2s ease;
  }
  .search-sticky.is-stuck::after{ opacity: 1; }

  .search-box{
    display:flex;
    gap:10px;
    margin-bottom: 6px;
  }
  .search-box input[type="text"]{
    flex:1;
    padding: 14px 16px;
    font-size: 1rem;
    border: 2px solid var(--navy);
    border-radius: 6px;
    outline: none;
    background:#fff;
    font-family: inherit;
  }
  .search-box input[type="text"]:focus{
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,162,39,0.18);
  }
  .search-box button{
    padding: 14px 22px;
    font-size: 1rem;
    font-weight: 600;
    color:#fff;
    background: var(--navy);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background .15s ease;
    font-family: inherit;
  }
  .search-box button:hover{ background: var(--navy-deep); }
  .search-box button:disabled{ opacity:.6; cursor: default; }

  .scroll-fab-group{
    position: fixed;
    right: 18px;
    bottom: 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 60;
    opacity: 0;
    transform: translateY(8px);
    pointer-events: none;
    transition: opacity .2s ease, transform .2s ease;
  }
  .scroll-fab-group.visible{
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .scroll-fab{
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--navy);
    color: #fff;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(8,26,48,0.28);
    transition: background .15s ease, transform .12s ease;
  }
  .scroll-fab:hover{ background: var(--navy-deep); transform: translateY(-1px); }
  .scroll-fab:active{ transform: translateY(0); }
  .scroll-fab svg{ width: 20px; height: 20px; }

  .hint{
    font-size: 0.8rem;
    color:#6b6f76;
    margin: 0 0 28px 2px;
  }

  .status{
    text-align:center;
    color:#6b6f76;
    padding: 30px 0;
    font-size: 0.95rem;
  }

  .search-loading{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    padding: 36px 0;
    color:#6b6f76;
    font-size: 0.95rem;
  }
  .search-loading .magnifier-wrap{
    width: 48px;
    height: 48px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .search-loading svg{
    color: var(--navy);
    animation: magnifier-scan 1.1s ease-in-out infinite;
    transform-origin: 70% 70%;
  }
  @keyframes magnifier-scan{
    0%   { transform: translate(0,0) rotate(0deg) scale(1); }
    25%  { transform: translate(4px,-3px) rotate(12deg) scale(1.05); }
    50%  { transform: translate(0,0) rotate(0deg) scale(1); }
    75%  { transform: translate(-4px,3px) rotate(-12deg) scale(1.05); }
    100% { transform: translate(0,0) rotate(0deg) scale(1); }
  }

  .result-count{
    margin: 0 0 16px 2px;
    font-size: 0.9rem;
    color: var(--navy);
    font-weight: 600;
  }

  .result-card{
    background:#fff;
    border: 1px solid var(--line);
    border-left: 5px solid var(--navy);
    border-radius: 6px;
    padding: 18px 20px;
    margin-bottom: 14px;
  }
  .card-head{
    display:flex;
    flex-wrap: wrap;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 10px;
  }
  .card-title{ font-weight: 700; color: var(--navy); font-size: 1.05rem; }
  .card-meta{ font-size: 0.82rem; color:#6b6f76; }
  .card-meta span{ margin-right: 10px; }

  .snippet{
    font-size: 0.92rem;
    line-height: 1.6;
    color: var(--ink);
    white-space: pre-wrap;
    margin-top: 6px;
  }
  .snippet mark{
    background: var(--gold-soft);
    color: var(--navy-deep);
    padding: 0 2px;
    border-radius: 2px;
  }

  .card-foot{ margin-top: 14px; text-align: right; }
  .card-foot a{
    display:inline-block;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--navy);
    text-decoration: none;
    border: 1px solid var(--navy);
    padding: 7px 14px;
    border-radius: 5px;
    transition: all .15s ease;
  }
  .card-foot a:hover{ background: var(--navy); color: #fff; }

  .empty{ text-align:center; padding: 50px 10px; color:#6b6f76; }
  .empty .big{ font-size: 2rem; margin-bottom: 8px; }

  footer{
    text-align:center;
    font-size: 0.78rem;
    color:#9a9a9a;
    padding: 20px 0 40px;
  }

  @media (max-width: 480px){
    header h1{ font-size: 1.25rem; }
    .search-box{ flex-direction: column; }
    .search-box button{ width: 100%; }
    .scroll-fab-group{ right: 12px; bottom: 18px; }
    .scroll-fab{ width: 40px; height: 40px; }
  }
</style>
</head>
<body>

<header>
  <h1>시카고언약장로교회 문서 검색</h1>
  <p>Chicago Covenant Presbyterian Church · Document Search</p>
</header>

<main>
  <div class="search-sticky" id="searchSticky">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="검색어 입력 (예: 비빔밥, CDARS, 선교회 …)" autocomplete="off">
      <button id="searchBtn">검색 Search</button>
    </div>
    <p class="hint">폴더 안의 모든 문서에서 제목과 본문 내용을 검색합니다. (Searches the title and full text of every document in the folder.)</p>
  </div>

  <div id="output"></div>
</main>

<div class="scroll-fab-group" id="scrollFabGroup">
  <button class="scroll-fab" id="scrollDownBtn" title="맨 아래로" aria-label="맨 아래로 이동">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 4v16M5 13l7 7 7-7"/>
    </svg>
  </button>
  <button class="scroll-fab" id="scrollTopBtn" title="맨 위로 (원위치)" aria-label="맨 위로 이동">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20V4M5 11l7-7 7 7"/>
    </svg>
  </button>
</div>

<footer>
  Chicago Covenant Presbyterian Church &middot; chicagocovenant.org
</footer>

<script>
  // ====================== 설정 ======================
  const API_URL = 'https://script.google.com/macros/s/AKfycbw1nXeagpzd16gBJJCBsD1RnfdwfCdO6j7BrcGPZys--Xu7spSdyn6w6tS0uvuffJPp/exec';

  const input = document.getElementById('searchInput');
  const btn = document.getElementById('searchBtn');
  const output = document.getElementById('output');

  let jsonpCounter = 0;

  function jsonpRequest(url, params) {
    return new Promise(function (resolve, reject) {
      jsonpCounter += 1;
      const callbackName = 'ccpc_cb_' + Date.now() + '_' + jsonpCounter;
      const script = document.createElement('script');

      const query = Object.keys(params)
        .map(function (k) { return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]); })
        .join('&');

      window[callbackName] = function (data) {
        resolve(data);
        delete window[callbackName];
        script.remove();
      };

      script.onerror = function () {
        reject(new Error('네트워크 오류로 검색에 실패했습니다.'));
        delete window[callbackName];
        script.remove();
      };

      script.src = url + (url.indexOf('?') === -1 ? '?' : '&') + query + '&callback=' + callbackName;
      document.body.appendChild(script);
    });
  }

  function escapeHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function highlight(text, keyword) {
    const escaped = escapeHtml(text);
    if (!keyword) return escaped;
    const safeKeyword = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp('(' + safeKeyword + ')', 'gi');
    return escaped.replace(re, '<mark>$1</mark>');
  }

  function renderResults(data, keyword) {
    if (!data || !data.results || data.results.length === 0) {
      output.innerHTML =
        '<div class="empty"><div class="big">🔍</div>' +
        '검색 결과가 없습니다.<br>다른 검색어로 다시 시도해 보세요.<br>' +
        '<span style="font-size:0.8rem">No matching documents found.</span></div>';
      return;
    }

    let html = '<p class="result-count">총 ' + data.results.length + '건의 문서를 찾았습니다.</p>';

    data.results.forEach(function (item) {
      const title = (item.연도 ? item.연도 + '년 ' : '') + (item.월 ? item.월 + '월 ' : '') + (item.회의종류 || item.파일명 || '문서');
      html += '<div class="result-card">';
      html += '  <div class="card-head">';
      html += '    <div class="card-title">' + escapeHtml(title) + '</div>';
      html += '    <div class="card-meta">';
      if (item.일시) html += '<span>📅 ' + escapeHtml(item.일시) + '</span>';
      if (item.장소) html += '<span>📍 ' + escapeHtml(item.장소) + '</span>';
      html += '    </div>';
      html += '  </div>';

      if (item.참석자) html += '  <div class="card-meta">참석자: ' + escapeHtml(item.참석자) + '</div>';

      if (item.스니펫) {
        html += '  <div class="snippet">' + highlight(item.스니펫, keyword) + '</div>';
      }

      html += '  <div class="card-foot">';
      if (item.원본링크) html += '<a href="' + escapeHtml(item.원본링크) + '" target="_blank" rel="noopener">원본 문서 보기 →</a>';
      html += '  </div>';
      html += '</div>';
    });

    output.innerHTML = html;
  }

  function runSearch() {
    const keyword = input.value.trim();
    if (!keyword) {
      output.innerHTML = '<p class="status">검색어를 입력해 주세요.</p>';
      return;
    }

    btn.disabled = true;
    output.innerHTML =
      '<div class="search-loading">' +
      '  <div class="magnifier-wrap">' +
      '    <svg viewBox="0 0 24 24" width="40" height="40" fill="none">' +
      '      <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="2.2"/>' +
      '      <line x1="15.2" y1="15.2" x2="21" y2="21" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>' +
      '    </svg>' +
      '  </div>' +
      '  <span>검색 중입니다…</span>' +
      '</div>';

    jsonpRequest(API_URL, { q: keyword })
      .then(function (data) {
        if (data && data.ok === false) {
          output.innerHTML = '<p class="status">오류가 발생했습니다: ' + escapeHtml(data.error) + '</p>';
          return;
        }
        renderResults(data, keyword);
      })
      .catch(function (err) {
        output.innerHTML = '<p class="status">오류가 발생했습니다: ' + escapeHtml(err.message) + '</p>';
      })
      .finally(function () { btn.disabled = false; });
  }

  btn.addEventListener('click', runSearch);
  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') runSearch();
  });

  // ====================== 스크롤 보조 버튼 (맨 아래로 / 맨 위로) ======================
  const scrollFabGroup = document.getElementById('scrollFabGroup');
  const scrollDownBtn = document.getElementById('scrollDownBtn');
  const scrollTopBtn = document.getElementById('scrollTopBtn');
  const searchSticky = document.getElementById('searchSticky');

  function updateScrollUI() {
    const scrollY = window.scrollY || document.documentElement.scrollTop;
    const pageHeight = document.documentElement.scrollHeight;
    const viewportHeight = window.innerHeight;

    // 페이지가 한 화면보다 충분히 길 때만 버튼을 보여준다
    const isScrollable = pageHeight > viewportHeight + 200;
    scrollFabGroup.classList.toggle('visible', isScrollable);

    // 맨 아래 근처에서는 "아래로" 버튼을 흐리게/비활성처럼 보이지 않게 그냥 둠
    // (대신 맨 위 도달 시 "위로" 버튼 숨겨도 되지만, 누르면 그냥 그대로이므로 유지)

    // 검색창이 화면 상단에 붙었는지(고정됐는지) 판단해 옅은 경계선을 보여줌
    searchSticky.classList.toggle('is-stuck', scrollY > 4);
  }

  scrollDownBtn.addEventListener('click', function () {
    window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
  });

  scrollTopBtn.addEventListener('click', function () {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  window.addEventListener('scroll', updateScrollUI, { passive: true });
  window.addEventListener('resize', updateScrollUI);

  // 검색 결과가 새로 그려질 때마다(페이지 높이가 바뀌므로) 버튼 표시 상태를 갱신
  const scrollUIObserver = new MutationObserver(updateScrollUI);
  scrollUIObserver.observe(output, { childList: true, subtree: true });

  updateScrollUI();
</script>

</body>
</html>
